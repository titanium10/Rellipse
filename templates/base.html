<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Replyze{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07090f;
      --surface: #0e1118;
      --border: #1a1d2e;
      --accent: #3b82f6;
      --accent-dim: #1e3a5f;
      --accent-glow: rgba(59,130,246,0.25);
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --red: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(7,9,15,0.9);
      backdrop-filter: blur(14px);
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .logo span { color: var(--accent); }

    .nav-right { display: flex; align-items: center; gap: 1rem; }

    .nav-link {
      font-size: 0.875rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-link:hover { color: var(--text); }

    .nav-btn {
      background: var(--accent);
      color: #fff;
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      transition: opacity 0.15s;
    }

    .nav-btn:hover { opacity: 0.85; }

    .nav-btn.outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .nav-btn.outline:hover { border-color: var(--accent); color: var(--accent); }

    /* ── AUTH PAGES shared styles ── */
    .auth-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .auth-card h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 0.4rem;
    }

    .auth-card .subtitle {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      width: 100%;
      background: #fff;
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
      margin-bottom: 1.25rem;
    }

    .google-btn:hover { opacity: 0.9; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

    .form-group { margin-bottom: 1rem; }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.04em;
    }

    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      padding: 0.7rem 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus { border-color: var(--accent); }

    .submit-btn {
      display: block;
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.8rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 1.25rem;
    }

    .submit-btn:hover { opacity: 0.88; }

    .auth-switch {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .auth-switch a { color: var(--accent); text-decoration: none; }
    .auth-switch a:hover { text-decoration: underline; }

    /* ── Flash messages ── */
    .flash {
      padding: 0.75rem 1rem;
      border-radius: 7px;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }

    .flash.error { background: rgba(239,68,68,0.1); border: 1px solid var(--red); color: var(--red); }
    .flash.success { background: rgba(34,197,94,0.1); border: 1px solid var(--green); color: var(--green); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1.5rem;
      font-size: 0.875rem;
      transition: transform 0.3s ease;
      z-index: 200;
      max-width: 380px;
      text-align: center;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--red); color: var(--red); }
    .toast.success { border-color: var(--green); color: var(--green); }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="/">Reply<span>ze</span></a>
    <div class="nav-right">
      {% if user %}
        <span class="nav-link">{{ user.name or user.email }}</span>
        <a class="nav-btn outline" href="/logout">Log out</a>
      {% else %}
        <a class="nav-link" href="/login">Log in</a>
        <a class="nav-btn" href="/signup">Get started</a>
      {% endif %}
    </div>
  </nav>

  {% block content %}{% endblock %}

  <div class="toast" id="toast"></div>

  <script>
    // Toast helper available globally
    let _toastTimer;
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => { t.className = 'toast'; }, 3500);
    }
  </script>

  {% block extra_scripts %}{% endblock %}

</body>
</html>
